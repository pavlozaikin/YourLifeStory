<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}YourLifeStory Publications{% endblock %}</title>
</head>
<body>
  <header>
    <nav>
      <a href="{% url 'public-feed' %}">Public feed</a>
      <a href="{% url 'my-publications' %}">My publications</a>
      <a href="{% url 'keyword-list' %}">Keywords</a>
      {% if request.user.is_authenticated %}
        <a href="{% url 'logout' %}">Logout</a>
      {% else %}
        <a href="{% url 'login' %}">Login</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
