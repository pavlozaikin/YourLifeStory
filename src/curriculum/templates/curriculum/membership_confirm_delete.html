{% extends "base.html" %}

{% block title %}Delete member | YourLifeStory{% endblock %}

{% block content %}
  <section class="panel">
    <h1>Delete member</h1>
    <p>Remove {{ membership.user.username }} from "{{ membership.curriculum.title }}"?</p>
    <form method="post">
      {% csrf_token %}
      <div class="actions">
        <button type="submit">Remove</button>
        <a class="button-link secondary" href="{% url 'curriculum:curriculum-detail' membership.curriculum.pk %}">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
