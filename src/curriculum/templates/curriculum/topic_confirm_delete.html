{% extends "base.html" %}

{% block title %}Delete topic | YourLifeStory{% endblock %}

{% block content %}
  <section class="panel">
    <h1>Delete topic</h1>
    <p>Delete "{{ topic.title }}"?</p>
    <form method="post">
      {% csrf_token %}
      <div class="actions">
        <button type="submit">Delete</button>
        <a class="button-link secondary" href="{% url 'curriculum:curriculum-detail' topic.curriculum.pk %}">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
