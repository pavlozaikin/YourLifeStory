{% extends "base.html" %}

{% block title %}Topic form | YourLifeStory{% endblock %}

{% block content %}
  <section class="panel">
    <h1>{% if form.instance.pk %}Edit topic{% else %}Create topic{% endif %}</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="actions">
        <button type="submit">Save</button>
      </div>
    </form>
  </section>
{% endblock %}
