<div class="markdown-editor" data-markdown-editor-shell>
  <div class="markdown-toolbar" role="toolbar" aria-label="Markdown formatting tools">
    <button type="button" data-markdown-action="wrap" data-markdown-before="**" data-markdown-after="**" data-markdown-placeholder="bold text">Bold</button>
    <button type="button" data-markdown-action="wrap" data-markdown-before="*" data-markdown-after="*" data-markdown-placeholder="italic text">Italic</button>
    <button type="button" data-markdown-action="wrap" data-markdown-before="> " data-markdown-after="" data-markdown-line="true" data-markdown-placeholder="quoted text">Quote</button>
    <button type="button" data-markdown-action="wrap" data-markdown-before="`" data-markdown-after="`" data-markdown-placeholder="code">Code</button>
    <button type="button" data-markdown-action="wrap" data-markdown-before="# " data-markdown-after="" data-markdown-line="true" data-markdown-placeholder="Heading">H1</button>
    <button type="button" data-markdown-action="wrap" data-markdown-before="## " data-markdown-after="" data-markdown-line="true" data-markdown-placeholder="Subheading">H2</button>
    <button type="button" data-markdown-action="wrap" data-markdown-before="- " data-markdown-after="" data-markdown-line="true" data-markdown-placeholder="list item">Bullet</button>
    <button type="button" data-markdown-action="wrap" data-markdown-before="1. " data-markdown-after="" data-markdown-line="true" data-markdown-placeholder="list item">Numbered</button>
    <button type="button" data-markdown-action="link">Link</button>
  </div>
  {{ field }}
</div>
