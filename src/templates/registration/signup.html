{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
<h2>Create your account</h2>
<p class="meta">Self-signup is controlled by admins in the Django admin panel.</p>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Create account</button>
</form>
<p><a href="{% url 'login' %}">Already have an account?</a></p>
{% endblock %}
